<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Số lao động trong doanh nghiệp - MSSV - Họ tên</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
#map { height: 100vh; }

.legend {
    background: white;
    padding: 10px;
}

.title {
    position: absolute;
    top: 10px;
    left: 50px;
    background: white;
    padding: 8px;
    font-weight: bold;
    z-index: 1000;
}
</style>
</head>

<body>

<div class="title">
Số lao động trong doanh nghiệp theo quận huyện Hà Nội<br>
MSSV - Họ tên
</div>

<div id="map"></div>

<script>

// Tạo bản đồ
var map = L.map('map').setView([21.03, 105.85], 10);

// Nền OpenStreetMap
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
}).addTo(map);

// Hàm phân cấp màu
function getColor(d) {
    return d > 10000 ? '#800026' :
           d > 8000  ? '#BD0026' :
           d > 6000  ? '#E31A1C' :
           d > 4000  ? '#FC4E2A' :
           d > 2000  ? '#FD8D3C' :
           d > 1000  ? '#FEB24C' :
                       '#FFEDA0';
}

// Style quận/huyện
function style(feature) {
    return {
        fillColor: getColor(feature.properties.value),
        weight: 1,
        color: 'white',
        fillOpacity: 0.7
    };
}

// Load districts
fetch('districts.geojson')
.then(res => res.json())
.then(data => {
    L.geoJSON(data, { style: style }).addTo(map);
});

// Load communes + label
fetch('communes.geojson')
.then(res => res.json())
.then(data => {
    L.geoJSON(data, {
        onEachFeature: function (feature, layer) {
            layer.bindTooltip(feature.properties.name, {
                permanent: true,
                direction: "center"
            });
        }
    }).addTo(map);
});

// Legend góc phải trên
var legend = L.control({position: 'topright'});

legend.onAdd = function () {
    var div = L.DomUtil.create('div', 'legend'),
        grades = [0, 1000, 2000, 4000, 6000, 8000, 10000];

    for (var i = 0; i < grades.length; i++) {
        div.innerHTML +=
            '<i style="background:' + getColor(grades[i]+1) +
            '; width:10px; height:10px; display:inline-block;"></i> ' +
            grades[i] + (grades[i + 1] ? '-' + grades[i + 1] + '<br>' : '+');
    }

    return div;
};

legend.addTo(map);

</script>

</body>
</html>
