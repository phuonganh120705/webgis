<!DOCTYPE html>
<html>
<head>
  <title>Number of acting enterprises — 2306060004 Ngô Phương Anh</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  
  <style>
    body { margin:0; padding:0; }
    #map { height: 600px; width: 100%; }
    .legend { 
      background: white; 
      line-height: 18px; 
      padding: 6px 8px; 
      box-shadow: 0 0 15px rgba(0,0,0,0.2); 
      border-radius: 5px; 
      position: absolute; 
      top: 10px; 
      right: 10px; 
      z-index: 1000;
    }
    .legend-color { display: inline-block; width: 18px; height: 18px; margin-right: 5px; }
  </style>
</head>
<body>

<h3>
Number of acting enterprises as of 31 Dec. 2022 by size of employees and by district (Under 10 people) — 2306060004 Ngô Phương Anh
</h3>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="hanoiDistricts.js"></script>

<script>
  // Tạo bản đồ
  var map = L.map('map').setView([21.0278, 105.8342], 11);

  // Lớp nền OSM
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors'
  }).addTo(map);

  // Hàm màu theo Value
  function getColor(value) {
    return value > 10000 ? '#800026' :
           value > 5000  ? '#BD0026' :
           value > 2000  ? '#E31A1C' :
           value > 1000  ? '#FC4E2A' :
           value > 500   ? '#FD8D3C' :
                            '#FEB24C';
  }

  // Style layer
  function style(feature) {
    return {
      fillColor: getColor(feature.properties.Value),
      weight: 1,
      opacity: 1,
      color: 'white',
      dashArray: '3',
      fillOpacity: 0.7
    };
  }

  // Thêm layer GeoJSON
  L.geoJSON(hanoiDistricts, {
    style: style,
    onEachFeature: function(feature, layer) {
      layer.bindPopup(
        '<b>' + feature.properties.Name_2 + '</b><br>' +
        feature.properties.label_full + '<br>' +
        'Value: ' + feature.properties.Value
      );
    }
  }).addTo(map);

  // Thêm legend
  var legend = L.control({position: 'topright'});
  legend.onAdd = function(map) {
    var div = L.DomUtil.create('div', 'legend');
    div.innerHTML += '<b>Number of enterprises</b><br>';
    var grades = [0, 500, 1000, 2000, 5000, 10000];
    var colors = ['#FEB24C','#FD8D3C','#FC4E2A','#E31A1C','#BD0026','#800026'];
    for (var i = 0; i < grades.length; i++) {
      div.innerHTML +=
        '<i class="legend-color" style="background:' + colors[i] + '"></i> ' +
        grades[i] + (grades[i + 1] ? '&ndash;' + grades[i + 1] + '<br>' : '+');
    }
    return div;
  };
  legend.addTo(map);
</script>

</body>
</html>
